<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css" />
  <title>大月曆預約系統</title>
</head>
<body>



  <!-- 匯出Excel、PDF -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- 匯出選擇彈窗 -->
<div class="modal-overlay" id="exportModal">
  <div class="add-event-wrapper" style="width:420px;max-width:90vw;">
    <div class="modal-header">
      <h3>匯出預約資料</h3>
      <div class="header-right">
      <button class="btn-close-view"><i class="fa-solid fa-xmark"></i></button>
      </div>
     </div>
    <div class="add-event-body">
      <div class="input-group">
  <label>匯出範圍</label>
  <select id="exportRange">
    <option value="currentMonth">當前顯示月份</option>
    <option value="currentWeek">當週</option>
    <option value="currentDay" id="optDayRange" style="display:none;">當日</option>
    <option value="allYear">全年所有預約</option>
  </select>
</div>
      <div class="input-group">
        <label>匯出格式</label>
        <select id="exportType">
          <option value="excel">Excel (.xlsx)</option>
          <option value="pdf">PDF (完整月曆畫面)</option>
        </select>
      </div>
      <button id="startExportBtn" class="btn-add-main" style="width:100%;margin-top:10px;">開始匯出</button>
    </div>
  </div>
</div>

<!-- 設定彈窗 -->
<div class="modal-overlay" id="settingModal">
  <div class="add-event-wrapper" style="width:500px;max-width:90vw;">
    <div class="modal-header">
      <h3>系統設定（房間 / 員工管理）</h3>
      <div class="header-right">
        <button class="btn-close-view"><i class="fa-solid fa-xmark"></i></button>
      </div>
    </div>
    <!-- 滾動容器 -->
    <div class="setting-scroll-wrap">
      <div class="add-event-body">
        <!-- 房間管理 -->
        <div class="setting-block">
          <h4>房間列表</h4>
          <div class="input-row">
            <input type="text" id="newRoomInput" placeholder="輸入新房間名稱">
            <button id="addRoomBtn" class="btn-add-main">新增</button>
          </div>
          <div id="roomListWrap" class="item-list"></div>
        </div>

        <!-- 員工管理 -->
        <div class="setting-block" style="margin-top:20px;">
          <h4>員工列表</h4>
          <div class="input-row">
            <input type="text" id="newEmpInput" placeholder="輸入員工姓名">
            <button id="addEmpBtn" class="btn-add-main">新增</button>
          </div>
          <div id="empListWrap" class="item-list"></div>
        </div>

        <!-- 公告設定（補回！你剛才刪掉了！） -->
        <div class="setting-block" style="border-top:1px solid #eee;padding-top:15px;">
          <h4>頂部公告設定</h4>
          <div class="input-group">
              <label>公告文字（留空白即關閉公告）</label>
              <input type="text" id="announcementInput" placeholder="輸入公告內容">
          </div>
          <button id="saveAnnouncementBtn" class="btn-add-main">儲存公告</button>
        </div>

        <!-- 房間回收站 -->
        <div class="setting-block" style="margin-top:20px;border-top:1px solid #eee;padding-top:15px;">
          <h4>
            房間回收站
            <button class="info-btn" data-tip="誤刪房間永久留存，開頁會自動彈窗提醒你清理，可手動恢復或永久刪除">
                <i class="fa-solid fa-circle-info"></i>
             </button>
          </h4>
          <div id="trashRoomWrap" class="item-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

    <div class="main-container">
   <div class="calendar-header">
  <div class="month-nav">
    <button id="prevbtn">&#8592;</button>
    <h2 id="monthYear">2026</h2>
    <button id="nextbtn">&#8594;</button>

    
    <select id="viewSelect" class="view-select">
      <option value="month">Month</option>
      <option value="week">Week</option>
      <option value="day">Day</option>
    </select>

    <!-- 篩選下拉選單 -->
    <select id="filterEmployee" class="filter-select" title="按員工篩選">
      <option value="">全部員工</option>
    </select>
    <select id="filterRoom" class="filter-select" title="按房間篩選">
      <option value="">全部房間</option>
    </select>

    <!-- 匯入Excel 按鈕+資訊提示 -->
    <div style="position:relative;display:inline-block;">
      <button id="importBtn" class="setting-btn" title="匯入Excel預約">
          <i class="fa-solid fa-file-excel"></i>
      </button>
      <!-- 右上角i提示按鈕 -->
      <button class="info-btn import-tip-btn" style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;font-size:10px;padding:0;">
          i
      </button>
      <input type="file" id="importFileInput" accept=".xlsx,.xls" style="display:none;">
    </div>
    <!-- 匯出按鈕 -->
    <button id="exportBtn" class="setting-btn" title="匯出預約表格">
        <i class="fa-solid fa-download"></i>
    </button>
    <!-- 【新增：批量刪除按鈕】 -->
    <button id="batchDeleteBtn" class="setting-btn" style="color:#c0392b;" title="批量刪除預約">
        <i class="fa-solid fa-trash-can"></i>
    </button>
    <!-- 設置按鈕 -->
    <button id="settingBtn" class="setting-btn" title="系統設定">
        <i class="fa-solid fa-gear"></i>
    </button>
  </div>
  <!-- ✅ 新增公告橫條，放在粉紅header內部！ -->
  <div class="announcement-bar">
    <span id="announcementText"></span>
  </div>
</div>

<div id="mainViewContainer">
    <div id="monthView" class="calendar-grid">
      <div class="weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div class="days" id="day"></div>
    </div>

    <div id="timelineView" class="timeline-container" style="display: none;">
    <div id="weekHeader" class="week-header">
        <div class="time-gutter"></div> 
        <div class="week-col-label">Sun</div>
        <div class="week-col-label">Mon</div>
        <div class="week-col-label">Tue</div>
        <div class="week-col-label">Wed</div>
        <div class="week-col-label">Thu</div>
        <div class="week-col-label">Fri</div>
        <div class="week-col-label">Sat</div>
    </div>

    <div class="day-view-container">
        <div class="time-column" id="timeColumn"></div>
        <div class="event-grid" id="eventGrid">
            </div>
    </div>
</div>
</div>

<div class="modal-overlay" id="listModal">
  <div class="add-event-wrapper">
    <div class="modal-header">
      <h3 id="listDateTitle">預約清單</h3>
      <div class="header-right">
      <button class="btn-close-view" title="Close">
        <i class="fa-solid fa-xmark"></i>
    </button>
    </div>
    </div>
    <div id="simpleEventList" style="padding: 10px; max-height: 300px; overflow-y: auto;">
      </div>
  </div>
</div>

<div class="modal-overlay" id="dayDetailModal">
  <div class="add-event-wrapper" style="width: 80%; max-width: 800px;">
    <div class="modal-header">
      <h3 id="detailDateTitle">時間軸視圖</h3>
      <div class="header-right">
      <button class="btn-close-view" title="Close">
        <i class="fa-solid fa-xmark"></i>
    </button>
    </div>
    </div>
    <div class="day-view-container">
      <div class="time-column" id="timeColumn"></div>
      <div class="event-grid" id="eventGrid"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="viewDetailModal">
  <div class="view-detail-card">
    <div class="view-detail-header">
      <div class="header-actions">
    <button id="btnDeleteDetail" title="Delete">
        <i class="fa-regular fa-trash-can"></i>
    </button>
    <button id="btnEditDetail" title="Edit">
        <i class="fa-solid fa-pencil"></i>
    </button>
    <button class="btn-close-view" title="Close">
        <i class="fa-solid fa-xmark"></i>
    </button>
</div>
    </div>
    <div class="view-detail-body">
      <div class="detail-color-bar" id="detailBar"></div>
      <div class="detail-info">
        <h2 id="viewEventTitle">活動名稱</h2>
        <p id="viewEventDate">日期</p>
        <p id="viewEventTime">時間</p>
        <p id="viewEventRoom" class="detail-room-tag">房間</p>
        <p id="viewEventEmployee" style="color: #666;">預約同事：<span></span></p>
      </div>
    </div>
  </div>
</div>


<div class="modal-overlay" id="modalOverlay">
  <div class="add-event-wrapper">
    <div class="modal-header">
      <h3 id="formTitle">新增預約</h3>
      <div class="header-right">
      <button class="btn-close-view" title="Close">
        <i class="fa-solid fa-xmark"></i>
    </button>
    </div>
    </div>
    <div class="add-event-body">
      <div class="input-group">
        <label>活動名稱</label>
        <input type="text" id="eventTitle" placeholder="例如：AI 訓練" />
      </div>
      <div class="input-group">
        <label>員工姓名</label>
        <select id="employeeName">
          <option>Pius</option>
          <option>Natalie</option>
          <option>Erle</option>
          <option>Ivy</option>
        </select>
        <!-- 自訂員工輸入框，預設隱藏 -->
        <input type="text" id="customEmpInput" placeholder="輸入自訂員工名稱" style="display:none;margin-top:6px;padding:8px;width:100%;">
      </div>
      <div class="input-group">
  <label>選擇房間</label>
  <select id="roomSelect">
    <option value="Classroom 1">Classroom 1</option>
    <option value="Classroom 2">Classroom 2</option>
    <option value="VIP Room">VIP Room</option>
    <option value="EDS">EDS</option>
    <option value="_custom_other">其他</option>
  </select>
</div>
      <div class="input-row">
  <div class="input-group">
    <label>開始時間</label>
    <select id="startTime">
      <option>00:00</option>
      <option>00:30</option>
      <option>01:00</option>
      <option>01:30</option>
      <option>02:00</option>
      <option>02:30</option>
      <option>03:00</option>
      <option>03:30</option>
      <option>04:00</option>
      <option>04:30</option>
      <option>05:00</option>
      <option>05:30</option>
      <option>06:00</option>
      <option>06:30</option>
      <option>07:00</option>
      <option>07:30</option>
      <option>08:00</option>
      <option>08:30</option>
      <option>09:00</option>
      <option>09:30</option>
      <option>10:00</option>
      <option>10:30</option>
      <option>11:00</option>
      <option>11:30</option>
      <option>12:00</option>
      <option>12:30</option>
      <option>13:00</option>
      <option>13:30</option>
      <option>14:00</option>
      <option>14:30</option>
      <option>15:00</option>
      <option>15:30</option>
      <option>16:00</option>
      <option>16:30</option>
      <option>17:00</option>
      <option>17:30</option>
      <option>18:00</option>
      <option>18:30</option>
      <option>19:00</option>
      <option>19:30</option>
      <option>20:00</option>
      <option>20:30</option>
      <option>21:00</option>
      <option>21:30</option>
      <option>22:00</option>
      <option>22:30</option>
      <option>23:00</option>
      <option>23:30</option>
    </select>
  </div>
  <div class="input-group">
    <label>結束時間</label>
    <select id="endTime">
      <option>00:30</option>
      <option>01:00</option>
      <option>01:30</option>
      <option>02:00</option>
      <option>02:30</option>
      <option>03:00</option>
      <option>03:30</option>
      <option>04:00</option>
      <option>04:30</option>
      <option>05:00</option>
      <option>05:30</option>
      <option>06:00</option>
      <option>06:30</option>
      <option>07:00</option>
      <option>07:30</option>
      <option>08:00</option>
      <option>08:30</option>
      <option>09:00</option>
      <option>09:30</option>
      <option>10:00</option>
      <option>10:30</option>
      <option>11:00</option>
      <option>11:30</option>
      <option>12:00</option>
      <option>12:30</option>
      <option>13:00</option>
      <option>13:30</option>
      <option>14:00</option>
      <option>14:30</option>
      <option>15:00</option>
      <option>15:30</option>
      <option>16:00</option>
      <option>16:30</option>
      <option>17:00</option>
      <option>17:30</option>
      <option>18:00</option>
      <option>18:30</option>
      <option>19:00</option>
      <option>19:30</option>
      <option>20:00</option>
      <option>20:30</option>
      <option>21:00</option>
      <option>21:30</option>
      <option>22:00</option>
      <option>22:30</option>
      <option>23:00</option>
      <option>23:30</option>
    </select>
  </div>
</div>
      <button class="btn-book">確認預約</button>
    </div>
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
